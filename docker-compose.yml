# docker-compose.yml
version: "3.9"

services:
  app1:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url_shortener
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  app2:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url_shortener
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  app3:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url_shortener
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    container_name: url_shortener_nginx
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

  worker:
    build: .
    container_name: url_shortener_worker
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url_shortener
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
